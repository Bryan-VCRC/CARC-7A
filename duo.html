<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ISV CORRIGAN">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <title>ISV CORRIGAN // CO-OP TERMINAL</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/duo.css">
</head>
<body>
  <!-- Boot sequence overlay -->
  <div id="boot-screen" class="boot-screen">
    <div class="boot-text">
      <pre id="boot-log"></pre>
      <div class="boot-cursor">_</div>
    </div>
  </div>

  <!-- CRT overlay effects -->
  <div class="crt-overlay"></div>
  <div class="scanlines"></div>

  <!-- Main app shell -->
  <div id="app" class="app hidden">
    <!-- Top status bar -->
    <header class="status-bar">
      <div class="status-left">
        <a class="menu-back" href="index.html" aria-label="Back to menu">&#9664; MENU</a>
        <span class="separator">//</span>
        <span class="status-label">CO-OP TERMINAL</span>
      </div>
      <div class="status-right">
        <span id="link-status" class="link-status" title="GM link">&#9679; GM</span>
        <span class="separator">|</span>
        <span id="clock" class="clock"></span>
      </div>
    </header>

    <!-- Two-player split screen: columns are generated by js/duo.js -->
    <main id="duo-split" class="duo-split"></main>

    <footer class="footer-bar">
      <span class="footer-text">WARDEN PROTOCOL ACTIVE</span>
      <span class="footer-text">CO-OP MODE // 2 CREW</span>
    </footer>
  </div>

  <script src="js/sync.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/duo.js"></script>
</body>
</html>
