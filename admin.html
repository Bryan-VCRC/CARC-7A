<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CARC-7A // GM CONSOLE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

    :root {
      --primary: #00ff9d;
      --primary-dim: #00cc7d;
      --danger: #ff3344;
      --warning: #ff6b35;
      --bg-deep: #0a0a0f;
      --bg-panel: #0d0d14;
      --bg-surface: #12121c;
      --border-color: #1e1e30;
      --text-bright: #e0e0e8;
      --text-dim: #606070;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --font-display: 'Orbitron', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-deep);
      color: var(--text-bright);
      font-family: var(--font-mono);
      min-height: 100vh;
      padding: 16px;
    }

    .admin-header {
      text-align: center;
      padding: 20px 0 24px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 24px;
    }

    .admin-title {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--primary);
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
    }

    .admin-subtitle {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-top: 6px;
    }

    .section {
      margin-bottom: 24px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .admin-btn {
      display: block;
      width: 100%;
      padding: 16px 20px;
      background: rgba(10, 10, 15, 0.6);
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s ease;
      margin-bottom: 8px;
      min-height: 52px;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
    }

    .admin-btn:active {
      border-color: var(--primary);
      background: rgba(0, 255, 157, 0.08);
      color: var(--primary);
    }

    .admin-btn.active {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(255, 51, 68, 0.1);
      box-shadow: 0 0 20px rgba(255, 51, 68, 0.1);
    }

    .admin-btn .btn-label {
      display: block;
      font-size: 14px;
    }

    .admin-btn .btn-desc {
      display: block;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .admin-btn.active .btn-desc {
      color: var(--danger);
      opacity: 0.6;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      background: var(--text-dim);
      vertical-align: middle;
    }

    .admin-btn.active .status-dot {
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
      animation: pulse-dot 1s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .admin-log {
      margin-top: 24px;
      padding: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      max-height: 200px;
      overflow-y: auto;
    }

    .admin-log-title {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .log-line {
      font-size: 10px;
      color: var(--text-dim);
      padding: 2px 0;
      letter-spacing: 1px;
    }

    .log-line.fear { color: var(--danger); }
    .log-line.ok { color: var(--primary-dim); }
    .log-line.warn { color: var(--warning); }

    .panic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .panic-btn {
      display: block;
      width: 100%;
      padding: 14px 12px;
      background: rgba(255, 51, 68, 0.05);
      border: 1px solid rgba(255, 51, 68, 0.25);
      color: var(--danger);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.1s ease;
      min-height: 52px;
      -webkit-tap-highlight-color: transparent;
    }

    .panic-btn:active {
      background: rgba(255, 51, 68, 0.2);
      border-color: var(--danger);
      box-shadow: 0 0 15px rgba(255, 51, 68, 0.2);
    }

    .panic-btn .btn-icon {
      font-size: 18px;
      display: block;
      margin-bottom: 4px;
    }

    .section.panic-section {
      margin-top: 16px;
    }

    /* Stat controls */
    .stat-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      margin-bottom: 6px;
    }

    .stat-control-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    .stat-control-label.hp { color: #00ff9d; }
    .stat-control-label.wounds { color: #ff6b35; }
    .stat-control-label.stress { color: #00d4ff; }

    .stat-control-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-val {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--text-bright);
      min-width: 24px;
      text-align: center;
    }

    .stat-max-label {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .stat-adj-btn {
      width: 36px;
      height: 36px;
      background: rgba(10, 10, 15, 0.6);
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      font-size: 18px;
      font-family: var(--font-mono);
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.1s ease;
    }

    .stat-adj-btn:active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(0, 255, 157, 0.08);
    }

    .stat-adj-btn.danger:active {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(255, 51, 68, 0.08);
    }

    .stat-max-control {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 14px;
      padding-left: 14px;
      border-left: 1px solid var(--border-color);
    }

    .stat-max-btn {
      width: 24px;
      height: 24px;
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      font-size: 12px;
      font-family: var(--font-mono);
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .stat-max-btn:active {
      border-color: var(--text-dim);
      color: var(--text-bright);
    }

    /* Wound Log */
    .wound-log-section {
      margin-top: 8px;
    }

    .wound-add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .wound-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      color: var(--text-bright);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 1px;
      outline: none;
    }

    .wound-input::placeholder {
      color: var(--text-dim);
    }

    .wound-input:focus {
      border-color: var(--warning);
    }

    .wound-add-btn {
      padding: 10px 16px;
      background: rgba(255, 107, 53, 0.08);
      border: 1px solid var(--warning);
      color: var(--warning);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 2px;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .wound-add-btn:active {
      background: rgba(255, 107, 53, 0.2);
    }

    .admin-wound-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      margin-bottom: 4px;
    }

    .admin-wound-label {
      font-size: 10px;
      color: var(--warning);
      letter-spacing: 1px;
      margin-right: 8px;
      white-space: nowrap;
    }

    .admin-wound-text {
      flex: 1;
      font-size: 11px;
      color: var(--text-bright);
      letter-spacing: 1px;
    }

    .wound-remove-btn {
      width: 24px;
      height: 24px;
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      font-size: 14px;
      font-family: var(--font-mono);
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .wound-remove-btn:active {
      border-color: var(--danger);
      color: var(--danger);
    }

    .admin-wound-empty {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      padding: 8px 0;
    }

    /* Wound Prompt Modal */
    .wound-prompt-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wound-prompt-modal.hidden {
      display: none;
    }

    .wound-prompt-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
    }

    .wound-prompt-box {
      position: relative;
      background: var(--bg-panel);
      border: 1px solid var(--warning);
      padding: 24px 20px;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 0 40px rgba(255, 107, 53, 0.15), inset 0 0 60px rgba(0, 0, 0, 0.3);
    }

    .wound-prompt-title {
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--warning);
      letter-spacing: 3px;
      margin-bottom: 6px;
      text-align: center;
    }

    .wound-prompt-sub {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 16px;
    }

    .wound-prompt-input {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      color: var(--text-bright);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 1px;
      outline: none;
      margin-bottom: 14px;
    }

    .wound-prompt-input:focus {
      border-color: var(--warning);
    }

    .wound-prompt-actions {
      display: flex;
      gap: 10px;
    }

    .wound-prompt-btn {
      flex: 1;
      padding: 12px 16px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 2px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }

    .wound-prompt-btn.cancel {
      background: rgba(10, 10, 15, 0.6);
      border: 1px solid var(--border-color);
      color: var(--text-dim);
    }

    .wound-prompt-btn.confirm {
      background: rgba(255, 107, 53, 0.1);
      border: 1px solid var(--warning);
      color: var(--warning);
    }

    .wound-prompt-btn.confirm:active {
      background: rgba(255, 107, 53, 0.25);
    }

    /* Death Banner */
    .death-banner {
      padding: 12px 16px;
      background: rgba(255, 51, 68, 0.1);
      border: 1px solid var(--danger);
      text-align: center;
      margin-bottom: 16px;
    }

    .death-banner.hidden {
      display: none;
    }

    .death-banner-text {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--danger);
      letter-spacing: 4px;
      animation: pulse-dot 1.5s infinite;
    }
  </style>
</head>
<body>

  <!-- Wound description prompt -->
  <div id="wound-prompt-modal" class="wound-prompt-modal hidden">
    <div class="wound-prompt-backdrop"></div>
    <div class="wound-prompt-box">
      <div class="wound-prompt-title">NEW WOUND</div>
      <div class="wound-prompt-sub" id="wound-prompt-sub">Describe the wound before applying it.</div>
      <input type="text" id="wound-prompt-input" class="wound-prompt-input" placeholder="e.g. Acid burn — lost left hand">
      <div class="wound-prompt-actions">
        <button id="wound-prompt-cancel" class="wound-prompt-btn cancel">CANCEL</button>
        <button id="wound-prompt-confirm" class="wound-prompt-btn confirm">APPLY WOUND</button>
      </div>
    </div>
  </div>

  <div class="admin-header">
    <div class="admin-title">GM CONSOLE</div>
    <div class="admin-subtitle">ISV CORRIGAN // WARDEN OVERRIDE</div>
  </div>

  <div id="death-banner" class="death-banner hidden">
    <div class="death-banner-text">CREW MEMBER DECEASED</div>
  </div>

  <div class="section">
    <div class="section-title">Player Stats</div>

    <div class="stat-control" data-stat="hp" data-max-stat="hpMax">
      <span class="stat-control-label hp">HP</span>
      <div class="stat-control-actions">
        <button class="stat-adj-btn danger" data-dir="-1">-</button>
        <span class="stat-val" id="admin-hp">6</span>
        <button class="stat-adj-btn" data-dir="+1">+</button>
        <div class="stat-max-control">
          <span class="stat-max-label">MAX</span>
          <button class="stat-max-btn" data-max-dir="-1">-</button>
          <span class="stat-val" id="admin-hp-max" style="font-size:13px;">6</span>
          <button class="stat-max-btn" data-max-dir="+1">+</button>
        </div>
      </div>
    </div>

    <div class="stat-control" data-stat="wounds" data-max-stat="woundsMax">
      <span class="stat-control-label wounds">WOUNDS</span>
      <div class="stat-control-actions">
        <button class="stat-adj-btn danger" data-dir="-1">-</button>
        <span class="stat-val" id="admin-wounds">0</span>
        <button class="stat-adj-btn" data-dir="+1">+</button>
        <div class="stat-max-control">
          <span class="stat-max-label">MAX</span>
          <button class="stat-max-btn" data-max-dir="-1">-</button>
          <span class="stat-val" id="admin-wounds-max" style="font-size:13px;">3</span>
          <button class="stat-max-btn" data-max-dir="+1">+</button>
        </div>
      </div>
    </div>

    <div class="stat-control" data-stat="stress" data-max-stat="stressMax">
      <span class="stat-control-label stress">STRESS</span>
      <div class="stat-control-actions">
        <button class="stat-adj-btn danger" data-dir="-1">-</button>
        <span class="stat-val" id="admin-stress">0</span>
        <button class="stat-adj-btn" data-dir="+1">+</button>
        <div class="stat-max-control">
          <span class="stat-max-label">MAX</span>
          <button class="stat-max-btn" data-max-dir="-1">-</button>
          <span class="stat-val" id="admin-stress-max" style="font-size:13px;">6</span>
          <button class="stat-max-btn" data-max-dir="+1">+</button>
        </div>
      </div>
    </div>
  </div>

  <div class="section wound-log-section">
    <div class="section-title">Wound Log</div>
    <div class="wound-add-row">
      <input type="text" id="wound-input" class="wound-input" placeholder="Describe the wound...">
      <button id="wound-add-btn" class="wound-add-btn">ADD</button>
    </div>
    <div id="admin-wound-list"></div>
  </div>

  <div class="section">
    <div class="section-title">Atmosphere Controls</div>

    <button class="admin-btn" id="fear-toggle">
      <span class="btn-label"><span class="status-dot"></span>FEAR MODE</span>
      <span class="btn-desc">Silent Hill-style screen distortion &amp; audio drone</span>
    </button>
  </div>

  <div class="section panic-section">
    <div class="section-title">Panic Triggers</div>
    <div class="panic-grid">
      <button class="panic-btn" id="panic-glitch" data-cmd="glitch">
        <span class="btn-icon">&#9608;</span>
        GLITCH BURST
      </button>
      <button class="panic-btn" id="panic-blackout" data-cmd="blackout">
        <span class="btn-icon">&#9679;</span>
        BLACKOUT
      </button>
      <button class="panic-btn" id="panic-corrupt" data-cmd="corrupt">
        <span class="btn-icon">&#9760;</span>
        DATA CORRUPT
      </button>
      <button class="panic-btn" id="panic-reboot" data-cmd="reboot">
        <span class="btn-icon">&#8635;</span>
        FORCE REBOOT
      </button>
    </div>
  </div>

  <div class="admin-log">
    <div class="admin-log-title">COMMAND LOG</div>
    <div id="admin-log-list"></div>
  </div>

<script>
(function () {
  "use strict";

  const channel = new BroadcastChannel("carc7a_admin");
  let fearActive = false;

  function log(msg, type) {
    const list = document.getElementById("admin-log-list");
    const now = new Date();
    const ts = [now.getHours(), now.getMinutes(), now.getSeconds()]
      .map(n => String(n).padStart(2, "0")).join(":");
    const line = document.createElement("div");
    line.className = "log-line" + (type ? " " + type : "");
    line.textContent = "[" + ts + "] " + msg;
    list.appendChild(line);
    list.scrollTop = list.scrollHeight;
  }

  const panicBtns = document.querySelectorAll(".panic-btn");

  // Fear mode toggle
  document.getElementById("fear-toggle").addEventListener("click", function () {
    fearActive = !fearActive;
    this.classList.toggle("active", fearActive);
    channel.postMessage({ type: "fear", active: fearActive });
    if (fearActive) {
      log("FEAR MODE ENGAGED", "fear");
    } else {
      log("FEAR MODE DISENGAGED", "ok");
    }
  });

  // Panic triggers
  var panicLabels = {
    glitch: "GLITCH BURST",
    blackout: "BLACKOUT",
    corrupt: "DATA CORRUPT",
    reboot: "FORCE REBOOT"
  };

  panicBtns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      var cmd = btn.dataset.cmd;
      channel.postMessage({ type: "panic", action: cmd });
      log("PANIC: " + panicLabels[cmd], "warn");
    });
  });

  // --- Player Stats Controls ---
  var stats = {
    hp: 6, hpMax: 6,
    wounds: 0, woundsMax: 3,
    stress: 0, stressMax: 6
  };

  // Load from localStorage if available
  try {
    var saved = JSON.parse(localStorage.getItem("carc7a_save"));
    if (saved && saved.player) {
      var keys = ["hp", "hpMax", "wounds", "woundsMax", "stress", "stressMax"];
      keys.forEach(function (k) {
        if (saved.player[k] !== undefined) stats[k] = saved.player[k];
      });
      updateAllStatDisplays();
    }
  } catch (e) {}

  function updateStatDisplay(stat) {
    var el = document.getElementById("admin-" + stat.replace(/([A-Z])/g, "-$1").toLowerCase());
    if (el) el.textContent = stats[stat];
  }

  function updateAllStatDisplays() {
    updateStatDisplay("hp");
    updateStatDisplay("hpMax");
    updateStatDisplay("wounds");
    updateStatDisplay("woundsMax");
    updateStatDisplay("stress");
    updateStatDisplay("stressMax");
  }

  function sendStat(stat) {
    channel.postMessage({ type: "stats", stat: stat, value: stats[stat] });
  }

  // --- Wound Prompt Modal ---
  var woundPromptModal = document.getElementById("wound-prompt-modal");
  var woundPromptInput = document.getElementById("wound-prompt-input");
  var woundPromptSub = document.getElementById("wound-prompt-sub");
  var woundPromptCallback = null;

  function showWoundPrompt(reason, callback) {
    woundPromptSub.textContent = reason;
    woundPromptInput.value = "";
    woundPromptCallback = callback;
    woundPromptModal.classList.remove("hidden");
    setTimeout(function () { woundPromptInput.focus(); }, 100);
  }

  function hideWoundPrompt() {
    woundPromptModal.classList.add("hidden");
    woundPromptCallback = null;
  }

  document.getElementById("wound-prompt-confirm").addEventListener("click", function () {
    var text = woundPromptInput.value.trim();
    if (!text) return;
    if (woundPromptCallback) woundPromptCallback(text);
    hideWoundPrompt();
  });

  document.getElementById("wound-prompt-cancel").addEventListener("click", hideWoundPrompt);
  woundPromptModal.querySelector(".wound-prompt-backdrop").addEventListener("click", hideWoundPrompt);
  woundPromptInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      var text = woundPromptInput.value.trim();
      if (!text) return;
      if (woundPromptCallback) woundPromptCallback(text);
      hideWoundPrompt();
    }
  });

  // --- Death state ---
  function checkDeath() {
    var dead = stats.wounds >= stats.woundsMax;
    document.getElementById("death-banner").classList.toggle("hidden", !dead);
    return dead;
  }

  // Apply a wound: increments count, logs description, syncs to player
  function applyWound(description) {
    stats.wounds++;
    updateStatDisplay("wounds");
    sendStat("wounds");

    woundLog.push(description);
    channel.postMessage({ type: "wound-log", action: "add", text: description });
    renderAdminWoundLog();
    log("WOUND #" + woundLog.length + ": " + description, "warn");

    if (checkDeath()) {
      log("CREW MEMBER HAS DIED", "fear");
      channel.postMessage({ type: "death", dead: true });
    }
  }

  // Value +/- buttons
  document.querySelectorAll(".stat-control").forEach(function (row) {
    var stat = row.dataset.stat;
    var maxStat = row.dataset.maxStat;

    row.querySelectorAll(".stat-adj-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var dir = parseInt(btn.dataset.dir);
        var newVal = stats[stat] + dir;
        if (newVal < 0) newVal = 0;
        if (newVal > stats[maxStat]) newVal = stats[maxStat];

        // Wound increment requires a description
        if (stat === "wounds" && dir > 0) {
          if (stats.wounds >= stats.woundsMax) return; // already dead
          showWoundPrompt("Describe the wound before applying it.", function (text) {
            applyWound(text);
          });
          return;
        }

        // Wound decrement — remove last wound log entry too
        if (stat === "wounds" && dir < 0 && stats.wounds > 0) {
          stats.wounds = newVal;
          updateStatDisplay(stat);
          sendStat(stat);
          if (woundLog.length > 0) {
            var idx = woundLog.length - 1;
            woundLog.splice(idx, 1);
            channel.postMessage({ type: "wound-log", action: "remove", index: idx });
            renderAdminWoundLog();
          }
          checkDeath();
          log("WOUNDS = " + newVal, "ok");
          return;
        }

        stats[stat] = newVal;
        updateStatDisplay(stat);
        sendStat(stat);

        // HP hit 0 — prompt for wound
        if (stat === "hp" && newVal === 0 && stats.wounds < stats.woundsMax) {
          showWoundPrompt("HP reached 0. Describe the wound.", function (text) {
            applyWound(text);
            // Reset HP to max for new wound threshold
            stats.hp = stats.hpMax;
            updateStatDisplay("hp");
            sendStat("hp");
            log("HP reset to " + stats.hpMax, "ok");
          });
        }

        log(stat.toUpperCase() + " = " + newVal, newVal === 0 && stat === "hp" ? "fear" : "ok");
      });
    });

    row.querySelectorAll(".stat-max-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var dir = parseInt(btn.dataset.maxDir);
        var newMax = stats[maxStat] + dir;
        if (newMax < 1) newMax = 1;
        stats[maxStat] = newMax;
        // Clamp current value to new max
        if (stats[stat] > newMax) {
          stats[stat] = newMax;
          updateStatDisplay(stat);
          sendStat(stat);
        }
        updateStatDisplay(maxStat);
        sendStat(maxStat);
        checkDeath();
        log(maxStat.toUpperCase() + " = " + newMax);
      });
    });
  });

  updateAllStatDisplays();

  // --- Wound Log ---
  var woundLog = [];

  // Load wound log from save
  try {
    var savedData = JSON.parse(localStorage.getItem("carc7a_save"));
    if (savedData && savedData.player && Array.isArray(savedData.player.woundLog)) {
      woundLog = savedData.player.woundLog;
    }
  } catch (e) {}

  function renderAdminWoundLog() {
    var list = document.getElementById("admin-wound-list");
    if (woundLog.length === 0) {
      list.innerHTML = '<div class="admin-wound-empty">No wounds recorded.</div>';
      return;
    }
    var html = "";
    woundLog.forEach(function (text, i) {
      html += '<div class="admin-wound-entry">' +
        '<span class="admin-wound-label">#' + (i + 1) + '</span>' +
        '<span class="admin-wound-text">' + escapeHtml(text) + '</span>' +
        '<button class="wound-remove-btn" data-index="' + i + '">&times;</button>' +
        '</div>';
    });
    list.innerHTML = html;

    list.querySelectorAll(".wound-remove-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var idx = parseInt(btn.dataset.index);
        var removed = woundLog.splice(idx, 1)[0];
        channel.postMessage({ type: "wound-log", action: "remove", index: idx });
        renderAdminWoundLog();
        log("WOUND #" + (idx + 1) + " removed", "warn");
      });
    });
  }

  function escapeHtml(text) {
    var div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  document.getElementById("wound-add-btn").addEventListener("click", addWound);
  document.getElementById("wound-input").addEventListener("keydown", function (e) {
    if (e.key === "Enter") addWound();
  });

  function addWound() {
    var input = document.getElementById("wound-input");
    var text = input.value.trim();
    if (!text) return;

    woundLog.push(text);
    channel.postMessage({ type: "wound-log", action: "add", text: text });
    renderAdminWoundLog();
    input.value = "";
    log("WOUND #" + woundLog.length + ": " + text, "warn");
  }

  renderAdminWoundLog();
  checkDeath();

  log("GM console ready. Awaiting commands.", "ok");
})();
</script>

</body>
</html>
