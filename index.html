<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ISV CORRIGAN">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <title>ISV CORRIGAN // OS SELECT</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body>
  <!-- Boot sequence overlay -->
  <div id="boot-screen" class="boot-screen">
    <div class="boot-text">
      <pre id="boot-log"></pre>
      <div class="boot-cursor">_</div>
    </div>
  </div>

  <!-- CRT overlay effects -->
  <div class="crt-overlay"></div>
  <div class="scanlines"></div>

  <!-- Mode selection menu -->
  <div id="menu" class="menu hidden">
    <header class="menu-header">
      <div class="menu-title">ISV CORRIGAN</div>
      <div class="menu-subtitle">CREW TERMINAL // SELECT OPERATIONS MODE</div>
    </header>

    <div class="menu-modes" id="menu-modes">
      <button class="mode-card" data-href="solo.html">
        <div class="mode-glyph">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
        </div>
        <div class="mode-info">
          <div class="mode-name">SINGLE PLAYER</div>
          <div class="mode-desc">Full crew terminal — journal, cargo, map &amp; archives.</div>
        </div>
        <div class="mode-go">&#9656;</div>
      </button>

      <button class="mode-card" data-href="duo.html">
        <div class="mode-glyph">
          <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3.2"/><circle cx="16" cy="8" r="3.2"/><path d="M2 21v-1a5 5 0 0 1 5-5h2a5 5 0 0 1 4 2"/><path d="M14 17a5 5 0 0 1 3-2h2a5 5 0 0 1 5 5v1"/></svg>
        </div>
        <div class="mode-info">
          <div class="mode-name">TWO PLAYER <span class="mode-tag">CO-OP</span></div>
          <div class="mode-desc">Two crew, hotseat toggle. Names, HP &amp; Stress, and a per-player loadout.</div>
        </div>
        <div class="mode-go">&#9656;</div>
      </button>
    </div>

    <footer class="menu-footer">
      <span>WARDEN PROTOCOL ACTIVE</span>
      <span>BIOS v4.2.1</span>
    </footer>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
